# CI for the three reference services.
#
# Mirrors what was verified locally: for each service, build the Dockerfile's
# `test` stage and run pytest inside it. No separate pip path — the test
# environment is exactly the Docker stage the README documents.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [taxpayer-registry, returns, exchange-gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          target: test
          tags: srx-${{ matrix.service }}:test
          load: true
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Run pytest
        run: docker run --rm srx-${{ matrix.service }}:test

  smoke:
    name: docker compose end-to-end smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the compose stack
        run: docker compose up -d --build --wait

      - name: Run smoke script
        run: scripts/smoke.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  yaml-lint:
    name: yaml syntax (openchoreo + workload)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.2
      - name: Parse OpenChoreo and workload manifests
        run: |
          set -e
          for f in openchoreo/project.yaml openchoreo/components/*.yaml services/*/workload.yaml; do
            python -c "import yaml,sys; list(yaml.safe_load_all(open('$f'))); print('ok  $f')"
          done
